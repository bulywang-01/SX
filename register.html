<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>三峽社區棒球隊入隊報名</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont;
      background: #f5f6f8;
      padding: 20px;
    }
    .container {
      max-width: 860px;
      margin: auto;
      background: #fff;
      padding: 32px;
      border-radius: 14px;
      box-shadow: 0 8px 28px rgba(0,0,0,.08);
    }
    .logo { text-align:center; margin-bottom:16px; }
    .logo img { max-width:120px; }
    h1 { text-align:center; margin-bottom:6px; }
    .subtitle {
      text-align:center; color:#6b7280;
      margin-bottom:28px; font-size:15px;
    }
    h3 {
      margin-top:36px; margin-bottom:14px;
      border-left:5px solid #2563eb;
      padding-left:10px; font-size:18px;
    }

    .form-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px 24px;
    }
    .form-full { grid-column:1 / -1; }

    label { font-size:14px; color:#374151; }
    input, select {
      width:100%; padding:9px 10px; margin-top:6px;
      font-size:15px; border:1px solid #d1d5db;
      border-radius:8px;
    }
    input:focus, select:focus {
      outline:none; border-color:#2563eb;
      box-shadow:0 0 0 1px #2563eb;
    }
    .hint { font-size:12px; color:#6b7280; margin-top:4px; }

    button {
      margin-top:36px; width:100%;
      padding:15px; font-size:16px;
      background:#2563eb; color:#fff;
      border:none; border-radius:10px;
      cursor:pointer;
    }
    button:disabled { background:#9ca3af; }

    /* ===== 精簡卡片式選項 ===== */
    .option-group { display:flex; gap:8px; margin-top:6px; flex-wrap:wrap; }
    .option input { display:none; }
    .option label {
      min-width:56px;
      padding:6px 10px;
      text-align:center;
      font-size:14px;
      border:1px solid #d1d5db;
      border-radius:8px;
      cursor:pointer;
      background:#f9fafb;
      transition:.15s;
    }
    .option input:checked + label {
      background:#2563eb; color:#fff; border-color:#2563eb;
    }

    @media (max-width:640px) {
      .form-grid { grid-template-columns:1fr; }
    }

    /* ===== 完成訊息 Modal ===== */
    #messageOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    #messageOverlay.show {
      display: flex;
    }
    
    .message-box {
      background: #ffffff;
      width: 90%;
      max-width: 420px;
      padding: 28px 24px 24px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
    }
    
    .message-box .icon {
      font-size: 40px;
      color: #22c55e; /* 綠色完成感 */
      margin-bottom: 12px;
    }
    
    .message-box h2 {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 600;
    }
    
    .message-box p {
      margin: 0;
      font-size: 15px;
      color: #374151;
      line-height: 1.6;
    }
    
    .message-box button {
      margin-top: 22px;
      padding: 10px 28px;
      font-size: 15px;
      background: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>
<div class="container">

  <div class="logo">
    <img src="./jpg/mark.jpg" alt="三峽社區棒球隊">
  </div>

  <h1>三峽社區棒球隊</h1>
  <div class="subtitle">入隊報名表</div>

  <form id="registrationForm">

    <!-- 球員 -->
    <h3>球員基本資料</h3>
    <div class="form-grid">

      <label class="form-full">球員姓名
        <input name="name" required>
      </label>

      <div class="form-full">
        <label>性別</label>
        <div class="option-group">
          <div class="option"><input type="radio" id="g_m" name="gender" value="男" required><label for="g_m">男</label></div>
          <div class="option"><input type="radio" id="g_f" name="gender" value="女"><label for="g_f">女</label></div>
        </div>
      </div>

      <label>出生年月日
        <input type="date" name="birthday" required>
      </label>

      <label>年級（升學後）
        <input name="grade">
      </label>

      <label class="form-full">就讀學校
        <input name="school">
      </label>

      <div>
        <label>打擊慣用手</label>
        <div class="option-group">
          <div class="option"><input type="radio" id="bat_r" name="batting_hand" value="右"><label for="bat_r">右</label></div>
          <div class="option"><input type="radio" id="bat_l" name="batting_hand" value="左"><label for="bat_l">左</label></div>
          <div class="option"><input type="radio" id="bat_b" name="batting_hand" value="左右"><label for="bat_b">左右</label></div>
        </div>
      </div>

      <div>
        <label>投球慣用手</label>
        <div class="option-group">
          <div class="option"><input type="radio" id="pit_r" name="pitching_hand" value="右"><label for="pit_r">右</label></div>
          <div class="option"><input type="radio" id="pit_l" name="pitching_hand" value="左"><label for="pit_l">左</label></div>
          <div class="option"><input type="radio" id="pit_b" name="pitching_hand" value="左右"><label for="pit_b">左右</label></div>
        </div>
      </div>

      <label>身高（公分）
        <input name="height_cm">
        <div class="hint">可選填</div>
      </label>

      <label>體重（公斤）
        <input name="weight_kg">
        <div class="hint">可選填</div>
      </label>

    </div>

    <!-- 監護人 -->
    <h3>監護人聯絡資料</h3>
    <div class="form-grid">
      <label class="form-full">監護人姓名
        <input name="guardian_name" required>
      </label>
      <label>監護人電話
        <input name="guardian_phone" placeholder="0910-200232" required>
      </label>
      <label>監護人 Email
        <input type="email" name="guardian_email">
      </label>
    </div>

    <!-- 家庭 -->
    <h3>家庭狀況</h3>
    <div class="form-grid">

      <div class="form-full">
        <label>是否曾加入其他球隊</label>
        <div class="option-group">
          <div class="option"><input type="radio" id="ot_y" name="other_team_status" value="是"><label for="ot_y">是</label></div>
          <div class="option"><input type="radio" id="ot_n" name="other_team_status" value="否" checked><label for="ot_n">否</label></div>
        </div>
      </div>

      <div class="form-full">
        <label>是否有兄弟姊妹一起報名</label>
        <div class="option-group">
          <div class="option"><input type="radio" id="sib_y" name="siblings_joined" value="是"><label for="sib_y">是</label></div>
          <div class="option"><input type="radio" id="sib_n" name="siblings_joined" value="否" checked><label for="sib_n">否</label></div>
        </div>
      </div>

      <div id="siblingsNameBlock" class="form-full" style="display:none;">
        <label>兄弟姊妹姓名
          <input name="siblings_names">
        </label>
      </div>

    </div>

    <!-- 家長協助 -->
    <h3>家長是否願意協助隊務</h3>
    <div class="option-group">
      <div class="option"><input type="radio" id="ps_y" name="parent_support" value="願意"><label for="ps_y">願意</label></div>
      <div class="option"><input type="radio" id="ps_m" name="parent_support" value="視情況"><label for="ps_m">視情況</label></div>
      <div class="option"><input type="radio" id="ps_n" name="parent_support" value="不便"><label for="ps_n">不便</label></div>
    </div>

    <!-- 棒球 -->
    <h3>棒球背景</h3>
    <div class="form-grid">
      <label class="form-full">棒球接觸程度
        <select name="baseball_level">
          <option value="">—</option>
          <option value="第一次接觸">第一次接觸</option>
          <option value="參加過體驗營">參加過體驗營</option>
          <option value="加入過社區棒球隊">加入過社區棒球隊</option>
          <option value="熟悉基本技術">熟悉基本技術</option>
          <option value="參與過校隊或社團">參與過校隊或社團</option>
        </select>
      </label>

      <label class="form-full">希望體驗日期
        <input type="date" name="trial_date">
      </label>
    </div>

    <button type="submit">送出報名</button>
  </form>

</div>

<script>
  const y=document.getElementById('sib_y');
  const n=document.getElementById('sib_n');
  const b=document.getElementById('siblingsNameBlock');
  y.addEventListener('change',()=>b.style.display='block');
  n.addEventListener('change',()=>b.style.display='none');
</script>

<script src="./js/form.js"></script>
</body>
</html>
