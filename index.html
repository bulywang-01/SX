<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>入隊報名</title>
</head>
<body>
  <h1>球隊入隊報名</h1>

  <form id="registrationForm">
    <label>球員姓名
      <input name="name" required>
    </label><br>

    <label>性別
      <select name="gender">
        <option>男</option>
        <option>女</option>
      </select>
    </label><br>

    <label>生日
      <input type="date" name="birthday">
    </label><br>

    <label>就讀學校
      <input name="school">
    </label><br>

    <label>打擊慣用
      <select name="batting_hand">
        <option>右</option>
        <option>左</option>
        <option>左右</option>
      </select>
    </label><br>

    <label>監護人電話
      <input name="guardian_phone" required>
    </label><br>

    <button type="submit">送出報名</button>
  </form>
</body>
</html>

<script src="js/config.js"></script>
